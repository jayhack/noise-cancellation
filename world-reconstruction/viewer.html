<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldMirror reconstruction</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; overflow: hidden; background: #07090d; color: #f4f7fb; }
      #stage { position: fixed; inset: 0; }
      #panel {
        position: fixed; z-index: 2; top: 18px; left: 18px; width: min(390px, calc(100vw - 36px));
        padding: 16px; border: 1px solid rgba(255,255,255,.14); border-radius: 14px;
        background: rgba(10,13,19,.82); backdrop-filter: blur(16px); box-shadow: 0 18px 50px rgba(0,0,0,.35);
      }
      h1 { margin: 0 0 6px; font-size: 17px; }
      p { margin: 0; color: #aab4c3; font-size: 13px; line-height: 1.45; }
      #status { margin-top: 10px; color: #8fd8ff; }
      label {
        display: inline-flex; margin-top: 12px; padding: 8px 11px; border-radius: 9px;
        background: #e8f5ff; color: #10151c; font-size: 13px; font-weight: 700; cursor: pointer;
      }
      input { display: none; }
      #drop { position: fixed; inset: 0; z-index: 1; display: none; place-items: center; background: rgba(7,9,13,.82); font-size: 24px; }
      body.dragging #drop { display: grid; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.6/build/gaussian-splats-3d.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="stage"></div>
    <div id="drop">Drop a .splat file</div>
    <aside id="panel">
      <h1>WorldMirror reconstruction</h1>
      <p>Orbit: drag · Zoom: wheel/pinch · Pan: right-drag</p>
      <p id="status">Loading gaussians.splat…</p>
      <label>Choose another .splat<input id="file" type="file" accept=".splat" /></label>
    </aside>
    <script type="module">
      import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

      const status = document.querySelector('#status');
      const fileInput = document.querySelector('#file');
      let viewer;

      async function loadScene(path, label) {
        status.textContent = `Loading ${label}…`;
        if (viewer) viewer.dispose();
        viewer = new GaussianSplats3D.Viewer({
          rootElement: document.querySelector('#stage'),
          cameraUp: [0, 1, 0],
          initialCameraPosition: [0, 0.4, 1.5],
          initialCameraLookAt: [0, 0.3, -1],
          gpuAcceleratedSort: false,
          sharedMemoryForWorkers: false,
          antialiased: false,
        });
        try {
          await viewer.addSplatScene(path, {
            format: GaussianSplats3D.SceneFormat.Splat,
            splatAlphaRemovalThreshold: 5,
            showLoadingUI: true,
            progressiveLoad: false,
          });
          viewer.start();
          status.textContent = label;
        } catch (error) {
          console.error(error);
          status.textContent = `Could not load ${label}. Choose the .splat file below.`;
        }
      }

      fileInput.addEventListener('change', () => {
        const file = fileInput.files?.[0];
        if (file) loadScene(URL.createObjectURL(file), file.name);
      });
      document.addEventListener('dragover', (event) => {
        event.preventDefault();
        document.body.classList.add('dragging');
      });
      document.addEventListener('dragleave', () => document.body.classList.remove('dragging'));
      document.addEventListener('drop', (event) => {
        event.preventDefault();
        document.body.classList.remove('dragging');
        const file = event.dataTransfer?.files?.[0];
        if (file) loadScene(URL.createObjectURL(file), file.name);
      });

      const scene = new URLSearchParams(location.search).get('scene') || 'gaussians.splat';
      loadScene(scene, scene);
    </script>
  </body>
</html>
